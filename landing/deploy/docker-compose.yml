services:
  minuta-landing:
    build:
      context: ./minuta-landing
      dockerfile: Dockerfile
    container_name: minuta-landing
    restart: unless-stopped
    networks: ['demo']
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.minuta.rule=Host(`minuta.morovision.ch`)"
      - "traefik.http.routers.minuta.entrypoints=websecure"
      - "traefik.http.routers.minuta.tls.certresolver=letsencrypt"
      - "traefik.http.services.minuta.loadbalancer.server.port=80"

networks:
  demo:
    external: true
    name: localaiagent_demo
